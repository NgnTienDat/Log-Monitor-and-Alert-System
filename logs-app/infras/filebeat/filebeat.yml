# Filebeat: đọc log của logs-app và đẩy sang Logstash
filebeat.inputs:
- type: log
  enabled: true
  # Đường dẫn file log bên trong container Filebeat (sẽ được map ở file compose)
  paths:
    - /var/log/logs-app/logs-app.log

  # Gộp các dòng stacktrace vào đúng 1 log entry (dựa trên dòng bắt đầu bằng timestamp)
  multiline.pattern: '^[0-9]{4}-[0-9]{2}-[0-9]{2}'
  multiline.negate: true
  multiline.match: after

processors:
  # Gắn metadata để Logstash/Elasticsearch dễ phân loại nguồn log
  - add_fields:
      target: ''
      fields:
        environment: 'dev'
        app_name: 'logs-app'

# Đích đến: Logstash chạy trong cùng docker network
output.logstash:
  # Cùng network khác compose thì gọi bằng container_name
  hosts: ["log-monitor-logstash:5044"] # Gọi sang container logstash chung mạng mạng docker
